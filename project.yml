name: Kakitori
options:
  bundleIdPrefix: com.ryankrol
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1,2"          # universal: iPhone + iPad
    # Simulator + CI stay unsigned (the DoD/CI xcodebuild commands also pass CODE_SIGNING_ALLOWED=NO
    # explicitly). Scoped to the simulator SDK so DEVICE builds (iphoneos) CAN sign — running on a
    # real iPhone requires a signature. Device signing is configured on the Kakitori target below.
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"
targets:
  Kakitori:
    type: application
    platform: iOS
    sources:
      - Sources
      # Hand-bundled decks loaded on launch (see BundledDeckLoader). The in-app package importer is
      # deferred; these ship inside the app so the content is always present with no onboarding.
      - path: BundledDecks
        buildPhase: resources
    resources:
      - path: Sources/Support/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        # Explicit — XcodeGen's derived id would be com.ryankrol.Kakitori (capital K);
        # build_run.sh, the harness overlays, and sibling-repo convention use lowercase.
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankrol.kakitori
        # Device runs (real iPhone) need a signature — automatic signing with the personal team.
        # Ignored for simulator/CI builds (unsigned via CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]=NO).
        # Team ID is not secret (it ships in every signed binary); lives here so `xcodegen generate`
        # doesn't wipe it. Let Xcode manage the profile (Automatic + -allowProvisioningUpdates).
        DEVELOPMENT_TEAM: M8WLH4PZ74
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}                  # REQUIRED — no letterboxing (legacy mode)
        CFBundleDisplayName: Kakitori
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.ryankrol.kakitori.apkg
            UTTypeDescription: Anki Deck Package
            UTTypeConformsTo:
              - public.data
              - public.zip-archive
            UTTypeTagSpecification:
              public.filename-extension:
                - apkg
        CFBundleDocumentTypes:
          - CFBundleTypeName: Anki Deck Package
            LSItemContentTypes:
              - com.ryankrol.kakitori.apkg
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
  KakitoriTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests/UnitTests]
    dependencies:
      - target: Kakitori
  KakitoriUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [Tests/UITests]
    dependencies:
      - target: Kakitori
schemes:
  Kakitori:
    build:
      targets: { Kakitori: all }
    test:
      targets: [KakitoriTests, KakitoriUITests]
